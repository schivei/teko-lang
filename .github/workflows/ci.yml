name: Teko Compiler Multi-Platform CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ---------------------------------------------------------------------------
  # RUNNER OPERACIONAL 1: AMBIENTE UBUNTU LINUX
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build & Test on Ubuntu Linux (GCC/Clang C23)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Install Build System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential ninja-build clang

      - name: Configure Project via CMake (Clang C23 Strict)
        run: |
          mkdir build_linux
          cd build_linux
          cmake .. -G "Ninja" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=Release

      - name: Execute Ninja Compilation Pipeline
        run: |
          cd build_linux
          ninja -j$(nproc)

      - name: Run Automated Test Suite (Unity Framework Assertions)
        run: |
          cd build_linux
          ./teko_tests

  # ---------------------------------------------------------------------------
  # RUNNER OPERACIONAL 2: AMBIENTE APPLE MACOS
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build & Test on Apple macOS (Xcode Clang M-Series/Intel)
    runs-on: macos-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Configure Project via CMake
        run: |
          mkdir build_macos
          cd build_macos
          cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Execute Native Compiling Pipeline
        run: |
          cd build_macos
          make -j$(sysctl -n hw.ncpu)

      - name: Run Automated Test Suite (Unity Framework Assertions)
        run: |
          cd build_macos
          ./teko_tests
