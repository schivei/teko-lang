name: Native (hosts build & test)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# NOTE on path filtering + required checks: we deliberately do NOT use workflow
# `on: paths:` (skipping the whole workflow leaves a *required* check stuck in
# "Expected — waiting for status" forever, blocking merge). Instead the workflow
# always runs, a `changes` job decides relevance, the heavy jobs skip on
# irrelevant (e.g. docs-only) changes, and the always-running `gate` job is the
# single required check. See README → "Branch protection".
jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.f.outputs.run }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            run:
              - 'src/**'
              - 'tests/**'
              - 'CMakeLists.txt'
              - '.github/workflows/native.yml'

  build-test:
    name: Build & Test (${{ matrix.label }})
    needs: changes
    if: ${{ needs.changes.outputs.run == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux x86_64 (Clang C23 / Ninja)
            test_bin: ./build/teko_tests
          - os: ubuntu-24.04-arm
            label: Linux arm64 (Clang C23 / Ninja)
            test_bin: ./build/teko_tests
          # macOS is arm64-only here: GitHub retired the Intel (macos-13) runners.
          - os: macos-latest
            label: macOS arm64 / Apple Silicon (AppleClang)
            test_bin: ./build/teko_tests
          - os: windows-latest
            label: Windows x86_64 (MSVC)
            test_bin: .\build\Release\teko_tests.exe
          - os: windows-11-arm
            label: Windows arm64 (MSVC)
            test_bin: .\build\Release\teko_tests.exe
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
      - name: Install Build Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          # The hosted image ships third-party apt sources (microsoft/azure) that
          # intermittently 403 and break `apt-get update`; we only need Ubuntu repos.
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list /etc/apt/sources.list.d/azure*.list /etc/apt/sources.list.d/azure-cli*.list 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y cmake build-essential ninja-build clang
      - name: Configure via CMake (Linux - Clang / Ninja, Release)
        if: runner.os == 'Linux'
        run: cmake -S . -B build -G "Ninja" -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=Release
      - name: Configure via CMake (macOS / Windows - default generator, Release)
        if: runner.os != 'Linux'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build (Release)
        run: cmake --build build --config Release --parallel 4
      - name: Run Automated Test Suite (Unity Framework Assertions)
        run: ${{ matrix.test_bin }}
      # Phase 13 native runner: compile a real .tks to a native binary via the hosted
      # emitter + system `cc`, run it, assert stdout. ELF/Mach-O + cc only, so the
      # Unix hosts (Linux x86_64/arm64, macOS arm64); the Windows MSVC native runner is
      # future work (PE-COFF + link.exe), not exercised here.
      - name: Native runner executable proof (Unix hosts)
        if: runner.os != 'Windows'
        run: bash runtime/native/run-native.sh ./build/teko ./build/libteko_rt.a

  # riscv64 has no native runner: cross-compile static + run under QEMU user-mode
  # emulation. Non-blocking (continue-on-error), so it never fails the gate.
  riscv64-qemu:
    name: Build & Test (Linux riscv64 — QEMU emulated, non-blocking)
    needs: changes
    if: ${{ needs.changes.outputs.run == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
      - name: Install riscv64 cross toolchain + QEMU user-mode
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list /etc/apt/sources.list.d/azure*.list /etc/apt/sources.list.d/azure-cli*.list 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-riscv64-linux-gnu qemu-user-static
      - name: Configure via CMake (cross riscv64, static, Release)
        run: |
          cmake -S . -B build -G "Ninja" \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=riscv64 \
            -DCMAKE_C_COMPILER=riscv64-linux-gnu-gcc \
            -DCMAKE_C_FLAGS="-static" \
            -DCMAKE_EXE_LINKER_FLAGS="-static" \
            -DCMAKE_BUILD_TYPE=Release
      - name: Build (cross-compile riscv64)
        run: cmake --build build --parallel 4
      - name: Run test suite under QEMU (emulated riscv64, slow)
        run: qemu-riscv64-static ./build/teko_tests

  # The single REQUIRED check: always runs, aggregates the heavy jobs. Passes when
  # they succeed OR are skipped (docs-only change); fails only on a real failure.
  gate:
    name: gate
    needs: [ build-test, riscv64-qemu ]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        run: |
          echo "results: ${{ join(needs.*.result, ',') }}"
          if echo "${{ join(needs.*.result, ',') }}" | grep -qE 'failure|cancelled'; then
            echo "A required job failed."; exit 1
          fi
          echo "gate OK"
