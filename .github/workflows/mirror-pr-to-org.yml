# .github/workflows/mirror-pr-to-org.yml
# Org-PR creator/updater for the promotion `schivei:main -> teko-org:main` (main-first era).
#
# AUTOMATED path (owner design 2026-07-23): the bump PR (branch `bump/v*`) carries the
# `teko.tkp` version bump PLUS `docs/bump_v<version>.md` — first line = the org PR TITLE,
# rest = the org PR BODY (meeting the PR-corpus requirements). When that PR squash-merges,
# the push to main (paths: teko.tkp + docs/bump_v*.md) fires this workflow, which reads the
# bump file for the CURRENT teko.tkp version and opens/updates the org PR.
#
# MANUAL path (workflow_dispatch) remains: empty inputs -> read the bump file exactly like
# the push path; filled inputs -> override title/body.
#
# LOCK: never runs on the org (repository guard) — after equalization this file exists on
# the org's main and the equalization push WOULD match the paths there; the guard kills it.
# REQUIRES the repo secret `ORG_PR_TOKEN` (pull-requests:write on teko-org/teko-lang).
name: Mirror PR to org

on:
  push:
    branches: [main]
    paths: ['teko.tkp', 'docs/bump_v*.md']
  workflow_dispatch:
    inputs:
      title:
        description: "Título do PR na org (vazio = 1ª linha de docs/bump_v<versão>.md)"
        required: false
        type: string
        default: ""
      body:
        description: "Descritivo markdown (vazio = resto do bump md)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: mirror-org-main
  cancel-in-progress: false

jobs:
  mirror:
    # Org-lock absoluto: nunca executa em teko-org (o push de equalização lá casaria os paths).
    if: github.repository == 'schivei/teko-lang'
    runs-on: ubuntu-latest
    env:
      ORG: teko-org/teko-lang
      BR: main
      IN_TITLE: ${{ inputs.title }}
      IN_BODY: ${{ inputs.body }}
    steps:
      - name: Guard — org secret present
        env:
          ORG_TOKEN: ${{ secrets.ORG_PR_TOKEN }}
        run: |
          set -eu
          if [ -z "${ORG_TOKEN:-}" ]; then
            echo "::error::ORG_PR_TOKEN secret is required (pull-requests:write on $ORG)."
            exit 1
          fi

      - name: Checkout (read teko.tkp + the bump doc)
        uses: actions/checkout@v4

      - name: Resolve title/body (inputs override; else docs/bump_v<version>.md)
        run: |
          set -eu
          TITLE_FILE="$RUNNER_TEMP/title.txt"
          BODY_FILE="$RUNNER_TEMP/body-src.md"
          if [ -n "${IN_TITLE:-}" ]; then
            printf '%s' "$IN_TITLE" > "$TITLE_FILE"
            printf '%s' "${IN_BODY:-}" > "$BODY_FILE"
            echo "Fonte: inputs do dispatch."
          else
            V="$(sed -n 's/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' teko.tkp | head -1)"
            F="docs/bump_v${V}.md"
            if [ ! -f "$F" ]; then
              echo "::error::bump doc '$F' não encontrado — o PR de bump deve conter teko.tkp (version=$V) E $F (1ª linha = título do PR da org; resto = descritivo)."
              exit 1
            fi
            head -1 "$F" | sed 's/^#\{1,\} *//' > "$TITLE_FILE"
            tail -n +2 "$F" > "$BODY_FILE"
            echo "Fonte: $F (version $V)."
          fi
          if [ ! -s "$TITLE_FILE" ]; then
            echo "::error::título vazio (1ª linha do bump doc ou input 'title')."
            exit 1
          fi

      - name: Open (or update) the cross-fork org PR (fork:main -> org:main)
        env:
          GH_TOKEN: ${{ secrets.ORG_PR_TOKEN }}
        run: |
          set -eu
          FORK_OWNER="${GITHUB_REPOSITORY%%/*}"
          TITLE="$(cat "$RUNNER_TEMP/title.txt")"
          BODY_FILE="$RUNNER_TEMP/org-pr-body.md"
          {
            cat "$RUNNER_TEMP/body-src.md"
            printf '\n\n---\n'
            printf 'Mirrored from %s (%s:%s -> %s) — %s.\n' \
              "$GITHUB_REPOSITORY" "$FORK_OWNER" "$BR" "$BR" "${GITHUB_EVENT_NAME}"
          } > "$BODY_FILE"
          EXIST="$(gh pr list --repo "$ORG" --state open --base "$BR" \
                     --json number,headRefName,headRepositoryOwner \
                     --jq "[.[] | select(.headRefName==\"$BR\" and .headRepositoryOwner.login==\"$FORK_OWNER\")][0].number" \
                     2>/dev/null || true)"
          if [ -n "${EXIST:-}" ] && [ "$EXIST" != "null" ]; then
            gh pr edit "$EXIST" --repo "$ORG" --title "$TITLE" --body-file "$BODY_FILE"
            echo "Updated org PR #$EXIST ($FORK_OWNER:$BR -> $BR)"
          else
            gh pr create --repo "$ORG" \
              --head "${FORK_OWNER}:${BR}" --base "$BR" \
              --title "$TITLE" --body-file "$BODY_FILE" --draft
            echo "Opened org draft PR ($FORK_OWNER:$BR -> $BR)"
          fi
