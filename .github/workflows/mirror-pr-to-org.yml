# .github/workflows/mirror-pr-to-org.yml
# MANUAL org-PR creator (workflow_dispatch): the OWNER dispatches it with a title + body and
# it opens (or updates) the cross-fork promotion PR on the org — `schivei:main -> teko-org:main`.
# Main-first era (owner ruling 0.3.1, 2026-07-23): work happens directly on the fork's main —
# there is no umbrella branch anymore, so the promotion target is ALWAYS main and the old
# `branch` input is gone.
# LOCK: never runs on the org (repository guard) — after equalization this file EXISTS on the
# org's main, but must never run there. Ref of dispatch is irrelevant (nothing is checked out).
# REQUIRES the repo secret `ORG_PR_TOKEN` (pull-requests:write on teko-org/teko-lang).
name: Mirror PR to org

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Título do PR na org"
        required: true
        type: string
      body:
        description: "Descritivo (markdown) do PR na org"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: mirror-org-main
  cancel-in-progress: false

jobs:
  mirror:
    # Org-lock absoluto: nunca executa em teko-org. Sem trava de ref — o alvo é fixo (main)
    # e o job não faz checkout de código.
    if: github.repository == 'schivei/teko-lang'
    runs-on: ubuntu-latest
    env:
      ORG: teko-org/teko-lang
      BR: main
      TITLE: ${{ inputs.title }}
      BODY: ${{ inputs.body }}
    steps:
      - name: Guard — org secret present
        env:
          ORG_TOKEN: ${{ secrets.ORG_PR_TOKEN }}
        run: |
          set -eu
          if [ -z "${ORG_TOKEN:-}" ]; then
            echo "::error::ORG_PR_TOKEN secret is required (pull-requests:write on $ORG)."
            exit 1
          fi

      - name: Open (or update) the cross-fork org PR (fork:main -> org:main)
        env:
          GH_TOKEN: ${{ secrets.ORG_PR_TOKEN }}
        run: |
          set -eu
          FORK_OWNER="${GITHUB_REPOSITORY%%/*}"
          # Title/body through FILES (never inline shell) — arbitrary Markdown is not shell-safe.
          BODY_FILE="$RUNNER_TEMP/org-pr-body.md"
          {
            printf '%s' "$BODY"
            printf '\n\n---\n'
            printf 'Opened via manual dispatch from %s (%s:%s -> %s).\n' \
              "$GITHUB_REPOSITORY" "$FORK_OWNER" "$BR" "$BR"
          } > "$BODY_FILE"
          EXIST="$(gh pr list --repo "$ORG" --state open --base "$BR" \
                     --json number,headRefName,headRepositoryOwner \
                     --jq "[.[] | select(.headRefName==\"$BR\" and .headRepositoryOwner.login==\"$FORK_OWNER\")][0].number" \
                     2>/dev/null || true)"
          if [ -n "${EXIST:-}" ] && [ "$EXIST" != "null" ]; then
            gh pr edit "$EXIST" --repo "$ORG" --title "$TITLE" --body-file "$BODY_FILE"
            echo "Updated org PR #$EXIST ($FORK_OWNER:$BR -> $BR)"
          else
            gh pr create --repo "$ORG" \
              --head "${FORK_OWNER}:${BR}" --base "$BR" \
              --title "$TITLE" --body-file "$BODY_FILE" --draft
            echo "Opened org draft PR ($FORK_OWNER:$BR -> $BR)"
          fi
