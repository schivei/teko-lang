# .github/workflows/mirror-pr-to-org.yml
# Auto-mirror a fork PR to the org (owner request). When a PR `alguma_branch -> seed` is OPENED,
# REOPENED, UPDATED (a new commit — synchronize) or EDITED on the fork, this pushes `alguma_branch`
# (same name) to the org and opens-or-updates an IDENTICAL PR there (`alguma_branch -> seed`, same
# title + body), so the owner reviews/merges both sides and cuts the seed. synchronize is what keeps
# the org head tracking every push to the fork PR — without it the org PR would freeze at the opening
# commit. Head may be any branch EXCEPT the seed itself or main.
#
# REQUIRES a repo secret `ORG_PR_TOKEN` — a PAT (or GitHub App token) with `contents:write` +
# `pull-requests:write` on `teko-org/teko-lang`. The fork's own github.token cannot write the org,
# so WITHOUT the secret this fails loud (never silently no-ops, never fabricates a PR).
#
# Scope: fork repo only; base = seed/linux-x86_64; head ≠ seed/linux-x86_64 and head ≠ main.
name: Mirror PR to org

on:
  pull_request:
    # opened/reopened create the org PR; synchronize re-pushes the head on every new commit
    # so the org side tracks the fork PR (the "Open (or update)" step is idempotent — it
    # force-pushes the branch and edits the existing org PR); edited keeps title/body in sync.
    types: [opened, reopened, synchronize, edited]
    branches: [seed/linux-x86_64]   # only PRs whose BASE is the seed branch

permissions:
  contents: read

concurrency:
  group: mirror-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  mirror:
    # fork only; head is any branch EXCEPT the seed itself or main. The umbrella head
    # (remodel/**) IS mirrored — it is pushed under a non-protected alias (see the resolve
    # step) so the org's branch protection on remodel/** never rejects the push.
    if: >-
      github.repository == 'schivei/teko-lang' &&
      github.event.pull_request.head.ref != 'seed/linux-x86_64' &&
      github.event.pull_request.head.ref != 'main'
    runs-on: ubuntu-latest
    env:
      ORG: teko-org/teko-lang
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      TITLE: ${{ github.event.pull_request.title }}
      BODY: ${{ github.event.pull_request.body }}
      NUM: ${{ github.event.pull_request.number }}
      ORG_TOKEN: ${{ secrets.ORG_PR_TOKEN }}
    steps:
      - name: Guard — secret present
        run: |
          set -eu
          if [ -z "${ORG_TOKEN:-}" ]; then
            echo "::error::ORG_PR_TOKEN secret is required (contents+pull-requests write on $ORG). No org PR created."
            exit 1
          fi

      - name: Checkout the PR head (full history)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          # Don't persist the github-actions[bot] credential in git config — its global
          # http.https://github.com/.extraheader overrides the ORG_PR_TOKEN embedded in the org
          # push URL below, so the push would resolve as github-actions[bot] and be denied 403.
          persist-credentials: false

      - name: Resolve the org head branch (alias the protected umbrella head)
        run: |
          set -eu
          # The org protects remodel/** (branch rule: "changes must be made through a pull
          # request" — GH013), so a DIRECT push of remodel/emit-throughput to the org is rejected
          # and no PR can be opened from it. Push the umbrella head under a NON-protected alias
          # (promote/<tail>) and open the org PR from that alias instead. Any other head keeps its
          # own name (feature branches aren't protected on the org).
          case "$HEAD_REF" in
            remodel/*) ORG_HEAD="promote/${HEAD_REF#remodel/}" ;;
            *)         ORG_HEAD="$HEAD_REF" ;;
          esac
          echo "ORG_HEAD=$ORG_HEAD" >> "$GITHUB_ENV"
          echo "org head branch = $ORG_HEAD  (fork head = $HEAD_REF)"

      - name: Push the head branch to the org (under its org-head name)
        run: |
          set -eu
          git push "https://x-access-token:${ORG_TOKEN}@github.com/${ORG}.git" \
            "HEAD:refs/heads/${ORG_HEAD}" --force-with-lease || \
            git push "https://x-access-token:${ORG_TOKEN}@github.com/${ORG}.git" "HEAD:refs/heads/${ORG_HEAD}"

      - name: Open (or update) the identical org PR
        env:
          GH_TOKEN: ${{ secrets.ORG_PR_TOKEN }}
        run: |
          set -eu
          BODY_FULL="${BODY}

---
Mirrored from ${GITHUB_REPOSITORY}#${NUM} (fork, head \`${HEAD_REF}\`). Titles/bodies kept in sync for the org-side merge."
          EXIST="$(gh pr list --repo "$ORG" --head "$ORG_HEAD" --base "$BASE_REF" --state open --json number --jq '.[0].number' || true)"
          if [ -n "${EXIST:-}" ]; then
            gh pr edit "$EXIST" --repo "$ORG" --title "$TITLE" --body "$BODY_FULL"
            echo "Updated org PR #$EXIST"
          else
            gh pr create --repo "$ORG" --head "$ORG_HEAD" --base "$BASE_REF" \
              --title "$TITLE" --body "$BODY_FULL" --draft
            echo "Opened org draft PR ($ORG_HEAD -> $BASE_REF)"
          fi
