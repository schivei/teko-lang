# .github/workflows/mirror-pr-to-org.yml
# MANUAL mirror (workflow_dispatch): the OWNER runs this from the Actions screen, passing the fork
# PR number as input. It opens/updates the cross-fork org PR `fork:branch -> org:branch` carrying
# the fork PR's title/body (drafts included). Manual because event-based triggers cannot cover the
# promotion PR:
#   - `pull_request` runs on the MERGE REF, which a conflicted cross-lineage promotion PR
#     (umbrella -> seed) never has — so it stays silent exactly when mirroring matters;
#   - `pull_request_target` registers its trigger from the DEFAULT branch (main), and this file
#     lives ONLY on the seed (owner invariant) — verified empirically: active workflow + file on
#     the base ref + edited events produced no run.
# REQUIRES the repo secret `ORG_PR_TOKEN` (pull-requests:write on teko-org/teko-lang). Reading the
# fork PR's metadata uses the default GITHUB_TOKEN (pull-requests: read).
name: Mirror PR to org

on:
  workflow_dispatch:
    inputs:
      pr:
        description: "Número do PR do fork (base = seed) a espelhar na org"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: mirror-pr-${{ inputs.pr }}
  cancel-in-progress: false

jobs:
  mirror:
    if: github.repository == 'schivei/teko-lang'
    runs-on: ubuntu-latest
    env:
      ORG: teko-org/teko-lang
      PR: ${{ inputs.pr }}
      SEED: seed/linux-x86_64
    steps:
      - name: Guard — org secret present
        env:
          ORG_TOKEN: ${{ secrets.ORG_PR_TOKEN }}
        run: |
          set -eu
          if [ -z "${ORG_TOKEN:-}" ]; then
            echo "::error::ORG_PR_TOKEN secret is required (pull-requests:write on $ORG). No org PR created."
            exit 1
          fi

      - name: Read the fork PR metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          gh pr view "$PR" --repo "$GITHUB_REPOSITORY" \
            --json state,baseRefName,headRefName,title,body > "$RUNNER_TEMP/pr.json"
          STATE=$(jq -r .state "$RUNNER_TEMP/pr.json")
          BASE_REF=$(jq -r .baseRefName "$RUNNER_TEMP/pr.json")
          HEAD_REF=$(jq -r .headRefName "$RUNNER_TEMP/pr.json")
          if [ "$STATE" != "OPEN" ]; then
            echo "::error::PR #$PR is $STATE — only open PRs are mirrored."
            exit 1
          fi
          if [ "$BASE_REF" != "$SEED" ]; then
            echo "::error::PR #$PR base is '$BASE_REF' — this mirror is for PRs whose base is the seed ($SEED)."
            exit 1
          fi
          if [ "$HEAD_REF" = "$SEED" ] || [ "$HEAD_REF" = "main" ]; then
            echo "::error::PR #$PR head '$HEAD_REF' is excluded (seed/main are never mirrored as heads)."
            exit 1
          fi
          # Title/body go through FILES (never inline shell) — arbitrary Markdown is not shell-safe.
          jq -r .title "$RUNNER_TEMP/pr.json" > "$RUNNER_TEMP/title.txt"
          jq -r .body  "$RUNNER_TEMP/pr.json" > "$RUNNER_TEMP/body-src.md"
          echo "HEAD_REF=$HEAD_REF" >> "$GITHUB_ENV"

      - name: Open (or update) the cross-fork org PR (fork:branch -> org:branch)
        env:
          GH_TOKEN: ${{ secrets.ORG_PR_TOKEN }}
        run: |
          set -eu
          FORK_OWNER="${GITHUB_REPOSITORY%%/*}"
          BODY_FILE="$RUNNER_TEMP/org-pr-body.md"
          {
            cat "$RUNNER_TEMP/body-src.md"
            printf '\n\n---\n'
            printf 'Mirrored from %s#%s (%s:%s -> %s). Manual dispatch; title/body synced on each run.\n' \
              "$GITHUB_REPOSITORY" "$PR" "$FORK_OWNER" "$HEAD_REF" "$HEAD_REF"
          } > "$BODY_FILE"
          TITLE="$(cat "$RUNNER_TEMP/title.txt")"
          EXIST="$(gh pr list --repo "$ORG" --state open --base "$HEAD_REF" \
                     --json number,headRefName,headRepositoryOwner \
                     --jq "[.[] | select(.headRefName==\"$HEAD_REF\" and .headRepositoryOwner.login==\"$FORK_OWNER\")][0].number" \
                     2>/dev/null || true)"
          if [ -n "${EXIST:-}" ] && [ "$EXIST" != "null" ]; then
            gh pr edit "$EXIST" --repo "$ORG" --title "$TITLE" --body-file "$BODY_FILE"
            echo "Updated org PR #$EXIST ($FORK_OWNER:$HEAD_REF -> $HEAD_REF)"
          else
            gh pr create --repo "$ORG" \
              --head "${FORK_OWNER}:${HEAD_REF}" --base "$HEAD_REF" \
              --title "$TITLE" --body-file "$BODY_FILE" --draft
            echo "Opened org draft PR ($FORK_OWNER:$HEAD_REF -> $HEAD_REF)"
          fi
