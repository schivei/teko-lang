# .github/workflows/open-pr.yml
# CI-driven PR creation (owner request) — facilitates the promotion process, at least the PR creation.
# Manual dispatch: fill head/base/title/body and it opens (or updates) the PR via `gh pr create`.
#
# Two scopes:
#   • FORK-internal (e.g. remodel/emit-throughput -> main on this same repo): github.token is enough.
#   • FORK -> ORG (head = schivei:<branch>, base = teko-org/teko-lang:main): needs a PAT with
#     pull-requests:write on the ORG, provided as the secret ORG_PR_TOKEN. Without it, the org path
#     is skipped with a clear message (never fabricates a PR).
name: Open PR

on:
  workflow_dispatch:
    inputs:
      head:
        description: "Head branch (this repo), e.g. remodel/emit-throughput"
        required: true
      base:
        description: "Base branch, e.g. main"
        required: true
        default: main
      title:
        description: "PR title"
        required: true
      body:
        description: "PR body (markdown)"
        required: false
        default: ""
      target_repo:
        description: "owner/repo to open the PR IN. Leave empty for THIS repo (fork-internal)."
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: write

jobs:
  open:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Open (or update) the PR
        env:
          H: ${{ github.event.inputs.head }}
          B: ${{ github.event.inputs.base }}
          T: ${{ github.event.inputs.title }}
          BODY: ${{ github.event.inputs.body }}
          TARGET: ${{ github.event.inputs.target_repo }}
          FORK_TOKEN: ${{ github.token }}
          ORG_TOKEN: ${{ secrets.ORG_PR_TOKEN }}
        run: |
          set -eu
          if [ -z "$TARGET" ] || [ "$TARGET" = "$GITHUB_REPOSITORY" ]; then
            # fork-internal PR — github.token suffices
            GH_TOKEN="$FORK_TOKEN"; export GH_TOKEN
            REPO="$GITHUB_REPOSITORY"; HEAD="$H"
          else
            # cross-repo (fork -> org): needs the org PAT + head prefixed with the fork owner
            if [ -z "${ORG_TOKEN:-}" ]; then
              echo "::error::target_repo=$TARGET needs secret ORG_PR_TOKEN (pull-requests:write on the org). Skipping — no PR fabricated."
              exit 1
            fi
            GH_TOKEN="$ORG_TOKEN"; export GH_TOKEN
            REPO="$TARGET"; HEAD="${GITHUB_REPOSITORY%%/*}:$H"
          fi
          if gh pr list --repo "$REPO" --head "${HEAD##*:}" --base "$B" --state open --json number --jq '.[0].number' | grep -q '[0-9]'; then
            N="$(gh pr list --repo "$REPO" --head "${HEAD##*:}" --base "$B" --state open --json number --jq '.[0].number')"
            gh pr edit "$N" --repo "$REPO" --title "$T" --body "$BODY"
            echo "Updated PR #$N on $REPO"
          else
            gh pr create --repo "$REPO" --head "$HEAD" --base "$B" --title "$T" --body "$BODY" --draft
            echo "Opened draft PR on $REPO ($HEAD -> $B)"
          fi
